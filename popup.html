<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <style>
      body {
        width: 210px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #fff;
        color: #222;
        padding: 5px;
      }
      .container {
        background: #fff;
        border-radius: 7px;
        padding: 20px 20px 20px 20px;
        border: 1px solid #e5e5e5;
      }
      .header {
        text-align: center;
        margin-bottom: 10px;
      }
      .title {
        font-size: 15px;
        font-weight: 600;
        color: #222;
        margin-bottom: 2px;
      }
      .subtitle {
        font-size: 11px;
        color: #888;
        margin-bottom: 0;
      }
      .addon-toggle-row {
        display: flex;
        justify-content: center;
        margin: 12px 0 10px 0;
      }
      .addon-toggle-btn {
        min-width: 90px;
        font-size: 13px;
        font-weight: 500;
        color: #fff;
        background: #346aff;
        border: none;
        border-radius: 6px;
        padding: 7px 0;
        cursor: pointer;
        transition: background 0.18s;
      }
      .addon-toggle-btn.on {
        background: linear-gradient(90deg, #346aff 60%, #5ecbff 100%);
        color: #fff;
        box-shadow: 0 2px 8px rgba(52,106,255,0.18);
        transition: background 0.18s, box-shadow 0.18s, color 0.18s;
        border: none;
      }
      .addon-toggle-btn.off {
        background: linear-gradient(90deg, #e0e0e0 60%, #f7f7f7 100%);
        color: #aaa;
        box-shadow: 0 2px 8px rgba(200,200,200,0.12);
        border: none;
        transition: background 0.18s, box-shadow 0.18s, color 0.18s;
      }
      .addon-toggle-btn.off:hover {
        background: linear-gradient(90deg, #f7f7f7 60%, #e0e0e0 100%);
        color: #346aff;
        box-shadow: 0 4px 16px rgba(52,106,255,0.10);
      }
      .addon-toggle-btn.on:hover {
        background: linear-gradient(90deg, #5ecbff 60%, #346aff 100%);
        color: #fff;
        box-shadow: 0 4px 16px rgba(52,106,255,0.22);
      }
      .feature-section {
        margin: 0;
        padding: 0;
        border: none;
      }
      .feature-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 7px;
        padding: 0;
      }
      .feature-label {
        font-size: 13px;
        color: #222;
        font-weight: 400;
      }
      .toggle-switch {
        position: relative;
        width: 32px;
        height: 18px;
        background: #e0e0e0;
        border-radius: 9px;
        cursor: pointer;
        border: none;
        outline: none;
        appearance: none;
        -webkit-appearance: none;
        transition: background 0.18s;
      }
      .toggle-switch:checked {
        background: #346aff;
      }
      .toggle-switch::before {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        width: 14px;
        height: 14px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.18s;
        box-shadow: 0 1px 2px rgba(0,0,0,0.07);
      }
      .toggle-switch:checked::before {
        transform: translateX(14px);
      }
      .disabled-label {
        color: #bbb !important;
        font-weight: 400 !important;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="title">쿠팡 검색결과 애드온</div>
        <div class="subtitle">새로운 정렬 옵션 및 광고 제거</div>
      </div>
      <div class="addon-toggle-row">
        <button id="addon-toggle-btn" class="addon-toggle-btn off">애드온 켜기</button>
      </div>
      <div class="feature-section">
        <div class="feature-item">
          <span class="feature-label">단위가격순 버튼</span>
          <input type="checkbox" id="toggle-unit-price-sort" class="toggle-switch sort-feature">
        </div>
        <div class="feature-item">
          <span class="feature-label">할인율순 버튼</span>
          <input type="checkbox" id="toggle-discount-rate-sort" class="toggle-switch discount-sort-feature">
        </div>
        <div class="feature-item">
          <span class="feature-label">가격순 버튼</span>
          <input type="checkbox" id="toggle-price-sort" class="toggle-switch price-sort-feature">
        </div>
        <div class="feature-item">
          <span class="feature-label">리스트 내 광고 제거</span>
          <input type="checkbox" id="toggle-remove-content" class="toggle-switch remove-content">
        </div>
        <div class="feature-item">
          <span class="feature-label">검색 개수 고정</span>
          <input type="checkbox" id="toggle-force-list-size" class="toggle-switch" checked>
        </div>
        <div class="feature-item" style="margin-top:-4px;">
          <span class="feature-label" style="opacity:0;">개수선택</span>
          <select id="list-size-select" style="font-size:13px;padding:2px 6px;border-radius:4px;">
            <option value="36">36개</option>
            <option value="48">48개</option>
            <option value="60">60개</option>
            <option value="72" selected>72개</option>
          </select>
        </div>
        <div class="feature-item">
          <span class="feature-label">키워드 필터링</span>
          <input type="checkbox" id="toggle-keyword-filter" class="toggle-switch keyword-filter-feature" checked>
        </div>
      </div>
      <script src="popup.js"></script>
    </div>
  </body>
</html>
