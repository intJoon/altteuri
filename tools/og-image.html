<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; margin: 0; overflow: hidden; }
    body {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f9ff;
      color: #212b36;
      font-family: "Malgun Gothic", "Segoe UI", sans-serif;
    }
    body::before,
    body::after {
      position: absolute;
      border-radius: 50%;
      background: rgba(52, 106, 255, 0.08);
      content: "";
    }
    body::before { top: -190px; right: -80px; width: 520px; height: 520px; }
    body::after { bottom: -210px; left: -170px; width: 430px; height: 430px; }
    .stage {
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 56px;
    }
    img { width: 300px; height: 300px; border-radius: 70px; }
    h1 {
      margin: 0;
      font-size: 168px;
      line-height: .94;
      letter-spacing: -.06em;
    }
    .copy {
      margin: 22px 0 0;
      color: #212b36;
      font-size: 72px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -.03em;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="stage">
    <img src="../web/public/icon.png" alt="">
    <main>
      <h1>알뜰이</h1>
      <p class="copy">쿠팡용 Chrome 확장</p>
    </main>
  </div>
</body>
</html>
